# ================================================================
#  Kitty — Catppuccin Mocha
#  Archivo: ~/.config/kitty/kitty.conf
#  Agrega estas líneas (o reemplaza las existentes de colores)
# ================================================================

# ── Fuente ───────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Colores Catppuccin Mocha ──────────────────────────────────
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

cursor                  #F5E0DC
cursor_text_color       #1E1E2E

url_color               #F5E0DC

# Barra de título
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# Pestañas
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colores del sistema
color0   #45475A   # black
color8   #585B70   # bright black (gray)
color1   #F38BA8   # red
color9   #F38BA8
color2   #A6E3A1   # green
color10  #A6E3A1
color3   #F9E2AF   # yellow
color11  #F9E2AF
color4   #89B4FA   # blue
color12  #89B4FA
color5   #CBA6F7   # magenta / mauve
color13  #CBA6F7
color6   #94E2D5   # cyan / teal
color14  #94E2D5
color7   #BAC2DE   # white
color15  #A6ADC8   # bright white

# ── Ventana ───────────────────────────────────────────────────
background_opacity      0.92
background_blur         30
window_padding_width    8
hide_window_decorations yes

# ── Cursor ────────────────────────────────────────────────────
cursor_shape            beam
cursor_blink_interval   0.5

# ── Pestañas ─────────────────────────────────────────────────
tab_bar_style           powerline
tab_powerline_style     round
