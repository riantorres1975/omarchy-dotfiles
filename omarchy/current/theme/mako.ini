include=~/.local/share/omarchy/default/mako/core.ini
include=~/.local/state/omarchy/toggles/mako.ini

background-color=#0c0b0ce6
text-color=#e2dddc
border-color=#b59790
border-size=1
border-radius=12
width=380
padding=14,18
outer-margin=16,22
font=sans-serif 13px
max-icon-size=40

progress-color=over #b5979040

[urgency=low]
background-color=#0c0b0ccc
border-color=#584e51
text-color=#FAFCFB

[urgency=normal]
background-color=#0c0b0ce6
border-color=#b59790
text-color=#e2dddc

[urgency=critical]
background-color=#0c0b0cf2
border-color=#c38b7b
text-color=#c38b7b
default-timeout=0
