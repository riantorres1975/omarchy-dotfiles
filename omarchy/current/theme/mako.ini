include=~/.local/share/omarchy/default/mako/core.ini
include=~/.local/state/omarchy/toggles/mako.ini

background-color=#1a1b26e6
text-color=#c0caf5
border-color=#7aa2f7
border-size=1
border-radius=12
width=380
padding=14,18
outer-margin=16,22
font=sans-serif 13px
max-icon-size=40

progress-color=over #7aa2f740

[urgency=low]
background-color=#1a1b26cc
border-color=#444b6a
text-color=#a9b1d6

[urgency=normal]
background-color=#1a1b26e6
border-color=#7aa2f7
text-color=#c0caf5

[urgency=critical]
background-color=#1a1b26f2
border-color=#f7768e
text-color=#f7768e
default-timeout=0
