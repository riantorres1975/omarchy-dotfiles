# ================================================================
#  Hyprland — Overrides visuales Catppuccin Mocha
#  Archivo: ~/.config/hypr/user.conf   (o agrega a bindings.conf)
#
#  Este archivo SOLO modifica la estética visual.
#  Los atajos de Omarchy se mantienen intactos.
#
#  Para activar: agrega esta línea al final de
#  ~/.config/hypr/hyprland.conf (si no existe ya):
#    source = ~/.config/hypr/user.conf
# ================================================================

# ── Colores del tema activo (generado por omarchy theme set) ──
source = ~/.config/omarchy/current/theme/hyprland-colors.conf

# ── Decoraciones de ventana ───────────────────────────────────
decoration {
  rounding = 12

  blur {
    enabled = true
    size = 6
    passes = 3
    noise = 0.02
    contrast = 0.9
    brightness = 0.85
    popups = true
  }

  shadow {
    enabled = true
    range = 20
    render_power = 3
    color = rgba(1e1e2ebb)
  }

  # Opacidad ligera para terminales (opcional, quita si no te gusta)
  # active_opacity   = 0.97
  # inactive_opacity = 0.90
}

# ── Bordes ────────────────────────────────────────────────────
general {
  border_size = 2
  col.active_border   = $col_active
  col.inactive_border = $col_inactive
  gaps_in  = 5
  gaps_out = 10
}

# ── Animaciones estilo PrawnBalls/HyDE ────────────────────────
animations {
  enabled = true

  bezier = easeOut,    0.05, 0.9,  0.1,  1.05
  bezier = easeIn,     0.4,  0.0,  1.0,  1.0
  bezier = linear,     1.0,  1.0,  1.0,  1.0
  bezier = overshot,   0.13, 0.99, 0.29, 1.1
  bezier = smoothIn,   0.25, 1.0,  0.5,  1.0

  animation = windows,     1, 5,  overshot, slide
  animation = windowsOut,  1, 4,  easeIn,   slide
  animation = border,      1, 10, linear
  animation = borderangle, 1, 8,  linear,   loop
  animation = fade,        1, 5,  smoothIn
  animation = workspaces,  1, 5,  overshot, slide
  animation = specialWorkspace, 1, 5, overshot, slidevert
}

# ── Sensación general del cursor ─────────────────────────────
input {
  follow_mouse = 1
  sensitivity  = 0
}

# ── Miscelánea ───────────────────────────────────────────────
misc {
  # Desactiva el logo de Hyprland en el fondo
  disable_hyprland_logo   = true
  disable_splash_rendering = true
  # Fondo oscuro Mocha mientras carga el wallpaper
  background_color        = rgb(1e1e2e)
  focus_on_activate       = true
}

# ── Esquinas de capas (waybar, rofi, etc.) ────────────────────
layerrule = blur, waybar
layerrule = blur, rofi
layerrule = ignorezero, rofi


