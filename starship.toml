add_newline = true
command_timeout = 200

format = """
[┌─](bold green)$username$hostname$directory$git_branch$git_status
[└─](bold green)$character
"""

[username]
show_always = true
style_user = "bold cyan"
format = "[󰄛 $user](bold cyan) "

[hostname]
ssh_only = false
format = "[@$hostname](bold yellow) "

[character]
error_symbol = "[❯](bold red)"
success_symbol = "[❯](bold green)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[󰉋 $repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"

[git_branch]
symbol = " "
format = "[ $branch]($style) "
style = "bold purple"

[git_status]
format     = '[$all_status]($style)'
style      = "bold red"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
